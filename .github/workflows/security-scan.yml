name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  banned-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Banned pattern scan (spawn exceptions)
        run: |
          echo "Scanning for banned patterns..."
          FAILED=0

          # Strict (zero tolerance)
          for pattern in "anthropic" ".spine" "ai-memory"; do
            HITS=$(grep -ri "$pattern" --include="*.py" --include="*.md" --include="*.json" --include="*.toml" . 2>/dev/null | grep -v ".git/" | grep -v "security-scan.yml" | wc -l)
            if [ "$HITS" -gt 0 ]; then
              echo "FAIL: '$pattern' ($HITS hits)"
              FAILED=1
            else
              echo "STRICT PASS: '$pattern'"
            fi
          done

          # NEXT.md - allowed in server.py + scorer (MCP catalog entries)
          NEXT_BAD=$(grep -ri "NEXT.md" --include="*.py" --include="*.md" --include="*.toml" . 2>/dev/null | grep -v ".git/" | grep -v "security-scan.yml" | grep -v "server.py\|scoring_engine.py" | wc -l)
          if [ "$NEXT_BAD" -gt 0 ]; then echo "FAIL: NEXT.md outside catalog"; FAILED=1; else echo "CONTEXT PASS: NEXT.md"; fi

          # claude - allowed in log_parser, server.py, scorer, tests
          CLAUDE_BAD=$(grep -ri "claude" --include="*.py" --include="*.md" --include="*.json" --include="*.toml" . 2>/dev/null | grep -v ".git/" | grep -v "security-scan.yml" | grep -vi "log_parser\|server\.py\|scoring_engine\|conftest\|test_" | wc -l)
          if [ "$CLAUDE_BAD" -gt 0 ]; then echo "FAIL: non-functional claude refs"; FAILED=1; else echo "CLAUDE PASS: all functional"; fi

          if [ "$FAILED" -eq 1 ]; then echo "FAILED"; exit 1; fi
          echo "All checks passed"

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        run: |
          pip install detect-secrets
          detect-secrets scan --all-files --exclude-files ".git/.*" > .secrets-baseline.json
          SECRETS=$(python -c "import json; d=json.load(open('.secrets-baseline.json')); print(len(d.get('results',{})))")
          echo "Files with potential secrets: $SECRETS"
